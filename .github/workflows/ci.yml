name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-mysql:
    name: "Tests (MySQL, py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: kanban_test
          MYSQL_USER: kanban
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[mysql,dev]"

      - name: Run migrations
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: testpass
          KANBAN_DB_NAME: kanban_test
        run: kanban-setup --auto --migrate-only

      - name: Run pytest
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: testpass
          KANBAN_DB_NAME: kanban_test
        run: pytest tests/ -x -q

  test-mariadb:
    name: "Tests (MariaDB, py3.13)"
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: kanban_test
          MYSQL_USER: kanban
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[mysql,dev]"

      - name: Run migrations
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: testpass
          KANBAN_DB_NAME: kanban_test
        run: kanban-setup --auto --migrate-only

      - name: Run pytest
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: testpass
          KANBAN_DB_NAME: kanban_test
        run: pytest tests/ -x -q

  test-sqlite:
    name: "Tests (SQLite, py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest (SQLite)
        env:
          KANBAN_BACKEND: sqlite
        run: >-
          pytest tests/
          --ignore=tests/test_db_backend.py
          --ignore=tests/test_setup.py
          -x -q

  test-sqlite-semantic:
    name: "Tests (SQLite + semantic, py3.13)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[semantic,dev]"

      - name: Run pytest (SQLite + semantic)
        env:
          KANBAN_BACKEND: sqlite
        run: >-
          pytest tests/
          --ignore=tests/test_db_backend.py
          --ignore=tests/test_setup.py
          -x -q

  test-mysql-semantic:
    name: "Tests (MySQL + semantic, py3.13)"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: kanban_test
          MYSQL_USER: kanban
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[mysql,semantic,dev]"

      - name: Run migrations
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: testpass
          KANBAN_DB_NAME: kanban_test
        run: kanban-setup --auto --migrate-only

      - name: Run pytest
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: testpass
          KANBAN_DB_NAME: kanban_test
        run: pytest tests/ -x -q

  lint:
    name: Lint and security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install tools
        run: pip install flake8 bandit

      - name: Run flake8
        run: flake8 kanban_mcp/ tests/

      - name: Run bandit
        run: bandit -r kanban_mcp/ -c pyproject.toml

  install-linux:
    name: Install script (Linux)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: kanban
          MYSQL_USER: kanban
          MYSQL_PASSWORD: changeme
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run install.sh --auto
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: changeme
          KANBAN_DB_NAME: kanban
          MYSQL_ROOT_USER: root
          MYSQL_ROOT_PASSWORD: rootpass
        run: bash install.sh --auto

      - name: Verify kanban-mcp is installed
        run: command -v kanban-mcp && echo "kanban-mcp found"

      - name: Verify kanban-cli works
        env:
          KANBAN_DB_HOST: 127.0.0.1
          KANBAN_DB_USER: kanban
          KANBAN_DB_PASSWORD: changeme
          KANBAN_DB_NAME: kanban
        run: kanban-cli --project /tmp summary

  install-macos:
    name: Install script (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install MySQL
        run: |
          brew install mysql
          brew services start mysql
          sleep 5
          mysql -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED BY 'rootpass';"

      - name: Run install.sh --auto
        env:
          KANBAN_DB_HOST: 127.0.0.1
          MYSQL_ROOT_PASSWORD: rootpass
        run: bash install.sh --auto

      - name: Verify kanban-cli works
        env:
          KANBAN_DB_HOST: 127.0.0.1
        run: kanban-cli --project /tmp summary

  install-windows:
    name: Install script (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content install.ps1 -Raw), [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "install.ps1 syntax OK"

      - name: Run install.ps1 --auto (no DB)
        shell: pwsh
        run: |
          # Install kanban-mcp; DB setup will be skipped (no MySQL running)
          .\install.ps1 -Auto

      - name: Verify kanban-mcp is installed
        shell: pwsh
        run: |
          if (-not (Get-Command "kanban-mcp" -ErrorAction SilentlyContinue)) {
            Write-Error "kanban-mcp not found in PATH"
            exit 1
          }
          Write-Host "kanban-mcp found at: $(Get-Command kanban-mcp | Select-Object -ExpandProperty Source)"

      - name: Install dev dependencies
        shell: pwsh
        run: pip install -e ".[dev]"

      - name: Run non-DB tests
        shell: pwsh
        env:
          KANBAN_BACKEND: sqlite
        run: >-
          pytest tests/test_sqlite_backend.py tests/test_export.py -x -q
